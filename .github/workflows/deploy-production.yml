name: Deploy to Production (cPanel)

on:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  deploy-production:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build for production
        run: npx vite build --base /

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.CPANEL_SSH_KEY }}" > ~/.ssh/cpanel_deploy
          chmod 600 ~/.ssh/cpanel_deploy
          ssh-keyscan -p 21098 68.65.123.140 >> ~/.ssh/known_hosts

      - name: Deploy to cPanel
        run: |
          cp .cpanel.yml dist/

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          cd dist
          git init
          git add -A
          git commit -m "deploy: ${GITHUB_SHA::7} $(date -u +'%Y-%m-%d %H:%M UTC')"

          GIT_SSH_COMMAND="ssh -i ~/.ssh/cpanel_deploy -o StrictHostKeyChecking=yes" \
          git push --force \
            ssh://guapnfsp@68.65.123.140:21098/home/guapnfsp/repositories/guapp-site \
            HEAD:production
